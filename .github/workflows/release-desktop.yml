name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      skip_signing:
        description: Skip code signing (dev / unsigned build)
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
          - os: ubuntu-latest
            label: Linux x64
          # macOS 分架构各打一包（sidecar 含 better-sqlite3 等原生模块，不能靠 Universal 外壳兼容 Intel）
          - os: macos-latest
            label: macOS arm64
            electron_arch: arm64
          - os: macos-latest
            label: macOS x64
            electron_arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify desktop version matches tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#desktop-v}"
          PKG_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag desktop-v$TAG_VERSION does not match apps/desktop/package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Configure code signing
        id: signcfg
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          skip=0
          if [[ "${{ github.ref_name }}" == *-dev* ]]; then
            skip=1
            echo "Dev pre-release tag — skipping code signing"
          fi
          if [[ "${{ inputs.skip_signing }}" == "true" ]]; then
            skip=1
            echo "skip_signing input — skipping code signing"
          fi

          if [[ "$skip" == "1" ]]; then
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          case "${{ runner.os }}" in
            macOS)
              if [ -n "${CSC_LINK:-}" ]; then
                echo "mode=mac" >> "$GITHUB_OUTPUT"
                echo "macOS code signing enabled"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::CSC_LINK not configured — unsigned macOS build"
              fi
              ;;
            Windows)
              if [ -n "${WIN_CSC_LINK:-}" ]; then
                echo "mode=win" >> "$GITHUB_OUTPUT"
                echo "Windows code signing enabled"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::WIN_CSC_LINK not configured — unsigned Windows build (do not use Apple CSC_LINK on Windows)"
              fi
              ;;
            *)
              echo "mode=unsigned" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build and publish desktop
        shell: bash
        run: |
          case "${{ matrix.electron_arch }}" in
            arm64) npm run build:publish:mac-arm64 -w @opptrix/desktop ;;
            x64)   npm run build:publish:mac-x64 -w @opptrix/desktop ;;
            *)     npm run build:publish -w @opptrix/desktop ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPPTRIX_RUNTIME_ARCH: ${{ matrix.electron_arch }}
          CSC_LINK: ${{ steps.signcfg.outputs.mode == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ steps.signcfg.outputs.mode == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          WIN_CSC_LINK: ${{ steps.signcfg.outputs.mode == 'win' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ steps.signcfg.outputs.mode == 'win' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ steps.signcfg.outputs.mode == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signcfg.outputs.mode == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.signcfg.outputs.mode == 'mac' && secrets.APPLE_TEAM_ID || '' }}
