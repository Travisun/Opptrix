name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      skip_signing:
        description: Skip code signing (dev / unsigned build)
        type: boolean
        default: false

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-dev* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" \
            --title "Opptrix Desktop ${VERSION}" \
            --notes "Automated desktop build for \`${VERSION}\`. Download the installer for your platform below." \
            $PRERELEASE_FLAG

  release:
    name: ${{ matrix.label }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
          - os: ubuntu-latest
            label: Linux x64
          - os: macos-latest
            label: macOS arm64
            electron_arch: arm64
          - os: macos-latest
            label: macOS x64
            electron_arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify desktop version matches tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#desktop-v}"
          PKG_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag desktop-v$TAG_VERSION does not match apps/desktop/package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Configure code signing
        id: signcfg
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          skip=0
          if [[ "${{ github.ref_name }}" == *-dev* ]]; then
            skip=1
            echo "Dev pre-release tag — skipping code signing"
          fi
          if [[ "${{ inputs.skip_signing }}" == "true" ]]; then
            skip=1
            echo "skip_signing input — skipping code signing"
          fi

          if [[ "$skip" == "1" ]]; then
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          case "${{ runner.os }}" in
            macOS)
              if [ -n "${CSC_LINK:-}" ]; then
                echo "mode=mac" >> "$GITHUB_OUTPUT"
                echo "macOS code signing enabled"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::CSC_LINK not configured — unsigned macOS build"
              fi
              ;;
            Windows)
              if [ -n "${WIN_CSC_LINK:-}" ]; then
                echo "mode=win" >> "$GITHUB_OUTPUT"
                echo "Windows code signing enabled"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::WIN_CSC_LINK not configured — unsigned Windows build"
              fi
              ;;
            *)
              echo "mode=unsigned" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build desktop package
        shell: bash
        env:
          SIGN_MODE: ${{ steps.signcfg.outputs.mode }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK_SECRET: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          OPPTRIX_RUNTIME_ARCH: ${{ matrix.electron_arch }}
        run: |
          case "$SIGN_MODE" in
            mac)
              export CSC_LINK="$CSC_LINK_SECRET"
              export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_SECRET"
              export APPLE_ID="$APPLE_ID_SECRET"
              export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
              export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
              ;;
            win)
              export WIN_CSC_LINK="$WIN_CSC_LINK_SECRET"
              export WIN_CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD_SECRET"
              ;;
            *)
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              unset CSC_LINK CSC_KEY_PASSWORD WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
              unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
              ;;
          esac

          case "${{ matrix.electron_arch }}" in
            arm64) npm run build:package:mac-arm64 -w @opptrix/desktop ;;
            x64)   npm run build:package:mac-x64 -w @opptrix/desktop ;;
            *)     npm run build:package -w @opptrix/desktop ;;
          esac

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          RELEASE_DIR="apps/desktop/release"

          mapfile -t files < <(find "$RELEASE_DIR" -maxdepth 1 -type f \( \
            -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o \
            -name '*.AppImage' -o -name '*.deb' -o -name 'latest*.yml' -o -name '*.blockmap' \
          \))

          if [ ${#files[@]} -eq 0 ]; then
            echo "No distributable artifacts under $RELEASE_DIR"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi

          echo "Uploading ${#files[@]} file(s) to release $TAG:"
          printf '  - %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber
