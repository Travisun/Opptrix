name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      skip_signing:
        description: Skip code signing (dev / unsigned build)
        type: boolean
        default: false

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPPTRIX_RELEASE_STRICT: '1'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          PRERELEASE_FLAG=""
          NOTES_FILE="$(mktemp)"
          if [[ "$TAG" == *-dev* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          node scripts/assemble-release-notes.mjs "$VERSION" > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" \
            --title "Opptrix Desktop ${VERSION}" \
            --notes-file "$NOTES_FILE" \
            $PRERELEASE_FLAG

  release:
    name: ${{ matrix.label }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # windows-latest is VS2026 / MSVC 14.51+; duckdb@1.4.x cannot compile there.
          - os: windows-2022
            label: Windows x64
          - os: ubuntu-latest
            label: Linux x64
          - os: macos-latest
            label: macOS arm64
            electron_arch: arm64
          - os: macos-latest
            label: macOS x64
            electron_arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Verify desktop version matches tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#desktop-v}"
          PKG_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag desktop-v$TAG_VERSION does not match apps/desktop/package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata policy
        run: node apps/desktop/scripts/verify-release-metadata-policy.mjs

      - name: Configure code signing
        id: signcfg
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          OPPTRIX_CODE_SIGNING_P12: ${{ secrets.OPPTRIX_CODE_SIGNING_P12 }}
          OPPTRIX_CODE_SIGNING_P12_PASSWORD: ${{ secrets.OPPTRIX_CODE_SIGNING_P12_PASSWORD }}
        run: |
          if [[ "${{ inputs.skip_signing }}" == "true" ]]; then
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "skip_signing input — unsigned build"
            exit 0
          fi

          case "${{ runner.os }}" in
            macOS)
              if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::CSC_LINK or CSC_KEY_PASSWORD missing — ad-hoc macOS build"
                exit 0
              fi

              KC="$RUNNER_TEMP/opptrix-signing.keychain-db"
              KC_PASS="ci-${{ github.run_id }}-${{ github.run_attempt }}"
              CERT="$RUNNER_TEMP/opptrix-cert.p12"
              echo "$CSC_LINK" | base64 --decode > "$CERT" 2>/dev/null || echo "$CSC_LINK" | base64 -D > "$CERT"

              security delete-keychain "$KC" 2>/dev/null || true
              security create-keychain -p "$KC_PASS" "$KC"
              security default-keychain -s "$KC"
              security unlock-keychain -p "$KC_PASS" "$KC"
              security set-keychain-settings -t 3600 -u "$KC"
              security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/^[[:space:]]*"\(.*\)"[[:space:]]*$/\1/')

              if security import "$CERT" -k "$KC" -P "$CSC_KEY_PASSWORD" \
                  -A -T /usr/bin/codesign -T /usr/bin/productbuild 2>/dev/null; then
                # Headless CI: codesign must access the private key without a GUI prompt (errSecUserCanceled).
                security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC"
                echo "CSC_KEYCHAIN=$KC" >> "$GITHUB_ENV"
                echo "MACOS_KEYCHAIN_PASSWORD=$KC_PASS" >> "$GITHUB_ENV"
                echo "mode=mac" >> "$GITHUB_OUTPUT"
                echo "macOS Developer ID signing enabled (headless keychain ready)"
                security find-identity -v -p codesigning "$KC"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::CSC_KEY_PASSWORD does not match CSC_LINK (.p12) — ad-hoc macOS build. Fix GitHub Secrets and rebuild for signed/notarized packages."
                security delete-keychain "$KC" 2>/dev/null || true
              fi
              rm -f "$CERT"
              ;;
            Windows)
              # Prefer commercial WIN_CSC_*; else Opptrix self-issued update cert (custom client verifier).
              if [ -z "${WIN_CSC_LINK:-}" ] && [ -n "${OPPTRIX_CODE_SIGNING_P12:-}" ]; then
                export WIN_CSC_LINK="$OPPTRIX_CODE_SIGNING_P12"
                export WIN_CSC_KEY_PASSWORD="${OPPTRIX_CODE_SIGNING_P12_PASSWORD:-}"
                echo "WIN_CSC_LINK=$WIN_CSC_LINK" >> "$GITHUB_ENV"
                echo "WIN_CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
                echo "Using OPPTRIX_CODE_SIGNING_P12 as Windows Authenticode identity (self-issued)"
              fi
              if [ -n "${WIN_CSC_LINK:-}" ]; then
                echo "mode=win" >> "$GITHUB_OUTPUT"
                echo "Windows code signing enabled"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
                echo "::warning::WIN_CSC_LINK / OPPTRIX_CODE_SIGNING_P12 not configured — unsigned Windows build"
              fi
              ;;
            Linux)
              if [ -n "${OPPTRIX_CODE_SIGNING_P12:-}" ]; then
                echo "mode=linux-cms" >> "$GITHUB_OUTPUT"
                echo "Linux CMS update signing material available"
              else
                echo "mode=unsigned" >> "$GITHUB_OUTPUT"
                echo "::warning::OPPTRIX_CODE_SIGNING_P12 not configured — Linux CMS update signatures will be skipped"
              fi
              ;;
            *)
              echo "mode=unsigned" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Build desktop package
        shell: bash
        env:
          OPPTRIX_UPDATE_BASE_URL: ${{ secrets.OPPTRIX_UPDATE_BASE_URL }}
          SIGN_MODE: ${{ steps.signcfg.outputs.mode }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK_SECRET: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          OPPTRIX_CODE_SIGNING_P12_SECRET: ${{ secrets.OPPTRIX_CODE_SIGNING_P12 }}
          OPPTRIX_CODE_SIGNING_P12_PASSWORD_SECRET: ${{ secrets.OPPTRIX_CODE_SIGNING_P12_PASSWORD }}
          OPPTRIX_CODE_SIGNING_KEY_PEM_SECRET: ${{ secrets.OPPTRIX_CODE_SIGNING_KEY_PEM }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          OPPTRIX_RUNTIME_ARCH: ${{ matrix.electron_arch }}
        run: |
          if [[ "${{ runner.os }}" == "macOS" && -n "${CSC_KEYCHAIN:-}" ]]; then
            cleanup_signing_keychain() {
              security delete-keychain "$CSC_KEYCHAIN" 2>/dev/null || true
              echo "Cleaned up signing keychain: $CSC_KEYCHAIN"
            }
            trap cleanup_signing_keychain EXIT
          fi

          case "$SIGN_MODE" in
            mac)
              # Certificate already imported in Configure step; reuse CSC_KEYCHAIN (do not pass CSC_LINK — electron-builder would recreate a temp keychain without headless ACL).
              security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$CSC_KEYCHAIN"
              export APPLE_ID="$APPLE_ID_SECRET"
              export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
              export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
              ;;
            win)
              if [ -n "${WIN_CSC_LINK_SECRET:-}" ]; then
                export WIN_CSC_LINK="$WIN_CSC_LINK_SECRET"
                export WIN_CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD_SECRET"
              else
                export WIN_CSC_LINK="$OPPTRIX_CODE_SIGNING_P12_SECRET"
                export WIN_CSC_KEY_PASSWORD="$OPPTRIX_CODE_SIGNING_P12_PASSWORD_SECRET"
              fi
              ;;
            linux-cms)
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              unset CSC_LINK CSC_KEY_PASSWORD WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
              if [ -n "${OPPTRIX_CODE_SIGNING_KEY_PEM_SECRET:-}" ]; then
                export OPPTRIX_CODE_SIGNING_KEY_PEM="$OPPTRIX_CODE_SIGNING_KEY_PEM_SECRET"
              elif [ -n "${OPPTRIX_CODE_SIGNING_P12_SECRET:-}" ]; then
                mkdir -p apps/desktop/.secrets
                P12="$RUNNER_TEMP/opptrix-cms.p12"
                echo "$OPPTRIX_CODE_SIGNING_P12_SECRET" | base64 --decode > "$P12"
                openssl pkcs12 -in "$P12" -nocerts -nodes \
                  -passin pass:"$OPPTRIX_CODE_SIGNING_P12_PASSWORD_SECRET" \
                  -out apps/desktop/.secrets/opptrix-code-signing.key
                rm -f "$P12"
              fi
              ;;
            *)
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              unset CSC_LINK CSC_KEY_PASSWORD WIN_CSC_LINK WIN_CSC_KEY_PASSWORD
              unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
              if [[ "${{ runner.os }}" == "macOS" ]]; then
                export OPPTRIX_MAC_UNSIGNED=1
              fi
              ;;
          esac

          case "${{ matrix.electron_arch }}" in
            arm64) npm run build:package:mac-arm64 -w @opptrix/desktop ;;
            x64)   npm run build:package:mac-x64 -w @opptrix/desktop ;;
            *)     npm run build:package -w @opptrix/desktop ;;
          esac

      - name: Clean up signing keychain
        if: always() && runner.os == 'macOS' && env.CSC_KEYCHAIN != ''
        run: |
          security delete-keychain "$CSC_KEYCHAIN" 2>/dev/null || true
          echo "Cleaned up signing keychain: $CSC_KEYCHAIN"

      - name: Verify update metadata matches built files
        shell: bash
        run: node apps/desktop/scripts/verify-release-artifacts.mjs apps/desktop/release

      - name: Verify electron-updater is bundled in app
        shell: bash
        run: node apps/desktop/scripts/verify-packaged-updater.mjs apps/desktop/release

      - name: Verify sidecar runtime deps are bundled
        shell: bash
        run: node apps/desktop/scripts/verify-packaged-runtime.mjs apps/desktop/release

      - name: Sign Linux update artifacts (CMS)
        if: runner.os == 'Linux' && steps.signcfg.outputs.mode == 'linux-cms'
        shell: bash
        env:
          OPPTRIX_CODE_SIGNING_KEY_PEM: ${{ secrets.OPPTRIX_CODE_SIGNING_KEY_PEM }}
          OPPTRIX_CODE_SIGNING_P12: ${{ secrets.OPPTRIX_CODE_SIGNING_P12 }}
          OPPTRIX_CODE_SIGNING_P12_PASSWORD: ${{ secrets.OPPTRIX_CODE_SIGNING_P12_PASSWORD }}
        run: |
          mkdir -p apps/desktop/.secrets
          if [ -n "${OPPTRIX_CODE_SIGNING_KEY_PEM:-}" ]; then
            printf '%s\n' "$OPPTRIX_CODE_SIGNING_KEY_PEM" > apps/desktop/.secrets/opptrix-code-signing.key
          elif [ -n "${OPPTRIX_CODE_SIGNING_P12:-}" ]; then
            P12="$RUNNER_TEMP/opptrix-cms.p12"
            echo "$OPPTRIX_CODE_SIGNING_P12" | base64 --decode > "$P12"
            openssl pkcs12 -in "$P12" -nocerts -nodes \
              -passin pass:"$OPPTRIX_CODE_SIGNING_P12_PASSWORD" \
              -out apps/desktop/.secrets/opptrix-code-signing.key
            rm -f "$P12"
          fi
          node apps/desktop/scripts/sign-update-artifact.mjs apps/desktop/release

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          RELEASE_DIR="apps/desktop/release"

          if [[ "${{ runner.os }}" == "macOS" && -n "${{ matrix.electron_arch }}" ]]; then
            if [[ -f "$RELEASE_DIR/latest-mac.yml" ]]; then
              mv "$RELEASE_DIR/latest-mac.yml" "$RELEASE_DIR/latest-mac-${{ matrix.electron_arch }}.yml"
              echo "Renamed latest-mac.yml → latest-mac-${{ matrix.electron_arch }}.yml (merged later in finalize job)"
            fi
          fi

          files=()
          while IFS= read -r file; do
            [ -n "$file" ] && files+=("$file")
          done < <(find "$RELEASE_DIR" -maxdepth 1 -type f \( \
            -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o \
            -name '*.AppImage' -o -name '*.deb' -o -name 'latest*.yml' -o -name '*.blockmap' -o \
            -name '*.opptrix-cms' \
          \) ! -name 'latest-mac.yml')

          if [ ${#files[@]} -eq 0 ]; then
            echo "No distributable artifacts under $RELEASE_DIR"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi

          echo "Uploading ${#files[@]} file(s) to release $TAG:"
          printf '  - %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber

  finalize-release:
    name: Finalize macOS update metadata
    needs: release
    runs-on: ubuntu-latest
    if: ${{ needs.release.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata policy
        run: node apps/desktop/scripts/verify-release-metadata-policy.mjs

      - name: Merge latest-mac.yml for both CPU architectures
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          WORK="$RUNNER_TEMP/mac-yml"
          mkdir -p "$WORK"

          gh release view "$TAG" --json assets --jq '.assets[].name' | sort > "$WORK/release-assets.txt"
          echo "Release assets:"
          cat "$WORK/release-assets.txt"

          if ! gh release download "$TAG" -p 'latest-mac-arm64.yml' -D "$WORK"; then
            echo "::error::Missing latest-mac-arm64.yml on release $TAG"
            exit 1
          fi
          if ! gh release download "$TAG" -p 'latest-mac-x64.yml' -D "$WORK"; then
            echo "::error::Missing latest-mac-x64.yml on release $TAG"
            exit 1
          fi

          node apps/desktop/scripts/merge-mac-update-yml.mjs \
            "$WORK/latest-mac-arm64.yml" \
            "$WORK/latest-mac-x64.yml" \
            "$WORK/latest-mac.yml"

          gh release view "$TAG" --json assets --jq '.assets[].name' | sort > "$WORK/release-assets.txt"

          node apps/desktop/scripts/verify-release-yml-on-github.mjs \
            "$WORK/latest-mac.yml" \
            "$WORK/release-assets.txt"

          for yml in latest.yml latest-linux.yml; do
            if gh release download "$TAG" -p "$yml" -D "$WORK" --clobber 2>/dev/null; then
              node apps/desktop/scripts/verify-release-yml-on-github.mjs \
                "$WORK/$yml" \
                "$WORK/release-assets.txt"
            fi
          done

          gh release upload "$TAG" "$WORK/latest-mac.yml" --clobber
          echo "Published merged latest-mac.yml to $TAG"

  sync-r2:
    name: Sync release to Cloudflare R2
    needs: finalize-release
    runs-on: ubuntu-latest
    if: ${{ needs.finalize-release.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata policy
        run: node apps/desktop/scripts/verify-release-metadata-policy.mjs

      - name: Download release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          WORK="$RUNNER_TEMP/r2-sync"
          mkdir -p "$WORK"
          gh release download "$TAG" -D "$WORK"
          echo "ASSET_DIR=$WORK" >> "$GITHUB_ENV"
          ls -la "$WORK"

      - name: Verify release coherence (tag, yml, assets)
        run: node apps/desktop/scripts/verify-release-coherence.mjs "${{ github.ref_name }}" "$ASSET_DIR"

      - name: Verify R2 credentials
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node apps/desktop/scripts/verify-r2-credentials.mjs

      - name: Sync to Cloudflare R2 (purge old + upload current)
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          OPPTRIX_UPDATE_BASE_URL: ${{ secrets.OPPTRIX_UPDATE_BASE_URL }}
        run: node apps/desktop/scripts/sync-release-to-r2.mjs "$ASSET_DIR"

      - name: Verify public update metadata
        shell: bash
        env:
          OPPTRIX_UPDATE_BASE_URL: ${{ secrets.OPPTRIX_UPDATE_BASE_URL }}
        run: |
          if [[ -z "${OPPTRIX_UPDATE_BASE_URL:-}" ]]; then
            echo "OPPTRIX_UPDATE_BASE_URL not set — skip public verify"
            exit 0
          fi
          BASE="${OPPTRIX_UPDATE_BASE_URL%/}/"
          for yml in latest-mac.yml latest.yml latest-linux.yml; do
            url="${BASE}${yml}"
            echo "Checking $url"
            curl -fsSL --retry 3 --retry-delay 2 "$url" -o /dev/null
          done
          echo "Public update metadata reachable on R2"

      - name: Purge Cloudflare CDN cache (latest-*.yml)
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          OPPTRIX_UPDATE_BASE_URL: ${{ secrets.OPPTRIX_UPDATE_BASE_URL }}
        run: node apps/desktop/scripts/purge-update-cdn-cache.mjs
