services:
  inno-a-stock:
    build: .
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      STOCK_RESEARCH_PORT: "8711"
      STOCK_RESEARCH_HOST: "0.0.0.0"
      API_PROXY_TARGET: "http://127.0.0.1:8711"
      LLM_PROVIDER: ${LLM_PROVIDER:-DeepSeek}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      DEFAULT_SCORECARD: ${DEFAULT_SCORECARD:-综合评估}
      DEFAULT_TOP_N: ${DEFAULT_TOP_N:-20}
    volumes:
      - inno-data:/app/apps/server/data
      - a-stock-layer:/root/.a_stock_layer
    restart: unless-stopped

volumes:
  inno-data:
  a-stock-layer:
