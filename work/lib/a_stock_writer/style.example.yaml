# AStockWriter 风格配置模板
# 复制为 style.yaml 后修改

name: "我的投研笔记"
industry: "科技/消费"
topics:
  - "半导体"
  - "新能源"
  - "消费电子"
target_audience: "有一定经验的投资者，希望理解行业逻辑和财务数据"
persona_role: "行业分析员"  # 人设类型

author: "张三"
voice: "第一人称"  # 第一人称/第三人称/客观

# 分析方式 —— 用于塑造文章的分析视角
analysis_approach: "财务数据"  # 财务数据/行业格局/商业模式/管理层/市场认知/综合
risk_focus: "行业风险"  # 财务风险/行业风险/估值风险/公司治理风险/宏观风险
content_density: "综合平衡"  # 数据密集/逻辑驱动/故事性强/综合平衡
signal_preference: "综合"  # 宏观数据/行业数据/资金数据/微观数据/情绪数据/综合
preferred_sector: "科技"  # 消费/科技/制造/医药/金融/周期/综合

# 写作风格
tone: "专业分析风"  # 专业分析风/朋友聊天风/犀利解读风/温暖陪伴风/反思复盘风
data_usage: "适量"  # 尽量多/适量/尽量少/看内容类型
blacklist: []
preferred_analogies:
  - "军事"
reference_accounts:
  - "XX公众号"

# 合规意识
compliance_awareness: true  # 固定为true，表示了解合规要求

# 视觉
theme: "professional-clean"
cover_style: "行业/数据类"  # 行业数据类/产业链图类/思考框架类/纯文字极简

# 写作人格（从 tone + analysis_approach 映射）
writing_persona: "value-investor"
